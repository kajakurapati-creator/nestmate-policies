<!DOCTYPE html>

  <title>Delete Account - NestMate</title>
</head>
<body>
  <h1>Delete Your NestMate Account</h1>
  <p>To delete your account and all associated data:</p>
  <ol>
    <li>Open the <strong>NestMate</strong> app</li>
    <li>Go to <strong>Settings</strong></li>
    <li>Tap <strong>"Delete Account"</strong></li>
    <li>Confirm deletion</li>
  </ol>
  <p>Your account and all data will be permanently deleted.</p>
</body>
</html>
